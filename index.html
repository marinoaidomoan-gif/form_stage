<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demande de Stages</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="charM">
        <div class="charC">
            <h1 class="logo">Madjib</h1>
            <div class="charB"></div>
        </div>
    </div>

    <div id="PageP" class="cache">

        <div id="gauche">
            <div id="animation">
                <div class="scene">
                    <i class="fa-solid fa-user-gear avatar-principal"></i>

                    <i class="fa-solid fa-graduation-cap icone-flottante diplom"></i>
                    <i class="fa-solid fa-briefcase icone-flottante stage"></i>
                    <i class="fa-solid fa-envelope icone-flottante message"></i>
                </div>

                <h2>Espaces Stages</h2>
                <p>Trouvez votre opportunité en quelque clics</p>
            </div>
        </div>

        <div id="droite">
            <div id="container">
                <h2>
                    Formulaire Stages
                </h2>

                <form action="https://formspree.io/f/mvzjaoyq" method="POST">

                    <!--Partie Nom-->
                    <div class="tran-input">
                        <input type="text" name="nom" id="nom" placeholder=" ">
                        <label for="nom">Nom</label>
                        <span class="erreur-message"></span>
                    </div>

                    <!--Partie Prenom-->
                    <div class="tran-input">
                        <input type="text" name="prenom" id="prenom" placeholder=" ">
                        <label for="prenom">Prenom</label>
                        <span class="erreur-message"></span>
                    </div>

                    <!--Partie telephone-->
                    <div class="tran-input">
                        <input type="number" name="telephone" id="telephone" placeholder=" ">
                        <label for="telephone">Telephone</label>
                        <span class="erreur-message"></span>
                    </div>

                    <!--Partie Email-->
                    <div class="tran-input">
                        <input type="email" name="email" id="email" placeholder=" ">
                        <label for="email">Email</label>
                        <span class="erreur-message"></span>
                    </div>

                    <!--
                    <label>Déposez votre CV (PDF) :</label><br>
                    <input type="file" id="cv" name="cv" accept=".pdf" required><br>
                    -->

                    <!--Partie Motivation-->
                    <div class="tran-input">
                        <textarea name="mtv" id="mtv" placeholder=" "></textarea>
                        <label for="mtv">Motivation</label>
                        <span class="erreur-message"></span>
                    </div>

                    <button type="submit">Envoyer la demande</button>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
